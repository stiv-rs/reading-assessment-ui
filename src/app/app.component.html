<div class="container">
  <h1>Reading Assessment MVP</h1>
  <p class="subtitle">Lee el siguiente texto en voz alta:</p>

  <div class="text-box">
    <p class="reference-text">{{ referenceText }}</p>
  </div>

  <div class="controls">
    <button *ngIf="!isRecording" (click)="startRecording()" class="btn-record">
      🎤 Iniciar Grabación
    </button>

    <button *ngIf="isRecording" (click)="stopRecording()" class="btn-stop">
      ⏹ Detener Grabación
    </button>

    <button *ngIf="audioBlob && !isRecording && !isLoading" (click)="analyze()" class="btn-analyze">
      🚀 Analizar Lectura
    </button>
  </div>

  <div *ngIf="isLoading" class="loading">
    <p>Procesando audio con IA... (Esto puede tomar unos segundos)</p>
  </div>

  <div *ngIf="result && !isLoading" class="results-container">
    <h2>Puntuación: <span class="score">{{ result.accuracyScore }}%</span></h2>

    <div class="words-result">
      <span *ngFor="let word of result.analyzedWords"
            class="word"
            [ngClass]="word.status.toLowerCase()">
        {{ word.word }}
      </span>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="box correct"></span> Correcto</span>
      <span class="legend-item"><span class="box omitted"></span> Omitido</span>
      <span class="legend-item"><span class="box misread"></span> Mal leído</span>
    </div>
  </div>
</div>
